# ============================================
# Flutter CI/CD Pipeline
# Analyze → Test → Build → Deploy
#   • PWA  → Vercel (production)
#   • Android → Play Store (internal)
#   • iOS     → App Store Connect / TestFlight
# ============================================
name: Flutter CI/CD

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target'
        required: false
        default: 'web'
        type: choice
        options: [web, android, ios, all]

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'

jobs:
  # ---- Analyze & Test ----
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test --coverage || true

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: coverage/
          retention-days: 7

  # ---- Build Android APK + AAB ----
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    if: github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || inputs.target == 'android' || inputs.target == 'all')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          mkdir -p android/keystore
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/keystore/promptgenie-release.jks
          else
            echo "::warning::ANDROID_KEYSTORE_BASE64 not set — generating ephemeral debug keystore"
            keytool -genkey -v \
              -keystore android/keystore/promptgenie-release.jks \
              -alias debug -keyalg RSA -keysize 2048 -validity 1 \
              -storepass android -keypass android \
              -dname "CN=debug" 2>/dev/null || true
          fi
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          storePassword=${KEYSTORE_PASS:-android}
          keyPassword=${KEY_PASS:-android}
          keyAlias=${KEY_ALIAS:-debug}
          storeFile=../keystore/promptgenie-release.jks
          EOF
        env:
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS:      ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS:     ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Build App Bundle (AAB)
        run: |
          flutter build appbundle --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://api.genieinprompt.app' }} \
            --dart-define=ENVIRONMENT=production

      - name: Build APK
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://api.genieinprompt.app' }} \
            --dart-define=ENVIRONMENT=production

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-symbols
          path: build/debug-info/
          retention-days: 90

  # ---- Build iOS ----
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    continue-on-error: true
    if: github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || inputs.target == 'ios' || inputs.target == 'all')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: cd ios && pod install --repo-update
        continue-on-error: true

      - name: Import signing certificate
        continue-on-error: true
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          p12-password:    ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Import provisioning profile
        continue-on-error: true
        uses: apple-actions/download-provisioning-profiles@v2
        with:
          bundle-id:       com.promptgenie.app
          issuer-id:       ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id:      ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Build iOS (no-codesign)
        run: |
          flutter build ios --release --no-codesign \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://api.genieinprompt.app' }} \
            --dart-define=ENVIRONMENT=production

      - name: Upload IPA
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Upload debug symbols
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-symbols
          path: build/debug-info/
          retention-days: 90

  # ---- Build PWA + Deploy to Vercel ----
  build-and-deploy-web:
    name: Build PWA + Deploy → Vercel
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: production
    env:
      HAS_VERCEL: ${{ secrets.VERCEL_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web (CanvasKit PWA)
        run: |
          flutter build web \
            --release \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://api.genieinprompt.app' }} \
            --dart-define=ENVIRONMENT=production

      - name: Inject build SHA into version.json
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:8}"
          node -e "
            const fs = require('fs');
            const p = 'build/web/version.json';
            const v = JSON.parse(fs.readFileSync(p, 'utf8'));
            v.build_sha = '${SHORT}';
            fs.writeFileSync(p, JSON.stringify(v));
            console.log('version.json enriched:', JSON.stringify(v));
          "
          echo "Build SHA ${SHORT} injected into version.json"

      - name: Verify PWA artefacts
        run: |
          test -f build/web/flutter_service_worker.js || { echo "::error::Service worker missing"; exit 1; }
          test -f build/web/manifest.json             || { echo "::error::manifest.json missing"; exit 1; }
          test -f build/web/index.html                || { echo "::error::index.html missing"; exit 1; }
          grep -q 'controllerchange' build/web/index.html || { echo "::error::Built index.html missing silent-update SW logic"; exit 1; }
          ! grep -q 'New version available! Reload to update' build/web/index.html || { echo "::error::Built index.html still has old confirm() prompt"; exit 1; }
          echo "Build size: $(du -sh build/web/ | cut -f1)"

      - name: Construct Vercel Build Output (prebuilt, zero-build)
        run: |
          set -e
          mkdir -p .vercel/output/static
          cp -a build/web/. .vercel/output/static/
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('vercel.json','utf8'));
            const routes = [];
            for (const h of (v.headers || [])) {
              const headers = {};
              for (const kv of (h.headers || [])) headers[kv.key] = kv.value;
              routes.push({ src: h.source, headers, continue: true });
            }
            routes.push({ handle: 'filesystem' });
            for (const r of (v.rewrites || [])) {
              routes.push({ src: r.source, dest: r.destination });
            }
            const config = { version: 3, routes };
            fs.writeFileSync('.vercel/output/config.json', JSON.stringify(config, null, 2));
            console.log('config.json routes:', routes.length);
          "
          echo '--- .vercel/output/config.json ---'
          cat .vercel/output/config.json
          echo '--- static dir size ---'
          du -sh .vercel/output/static

      - name: Install Vercel CLI
        if: env.HAS_VERCEL == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel project metadata
        if: env.HAS_VERCEL == 'true'
        timeout-minutes: 3
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (production, prebuilt)
        if: env.HAS_VERCEL == 'true'
        id: vercel_deploy
        timeout-minutes: 8
        run: |
          set -e
          URL=$(vercel deploy --prebuilt --prod --yes \
            --token="${{ secrets.VERCEL_TOKEN }}" 2>&1 | tee /tmp/vercel.log | tail -1)
          echo "Deployment URL: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke-test Vercel deployment
        if: env.HAS_VERCEL == 'true'
        env:
          DEPLOY_URL: ${{ vars.VERCEL_URL || 'https://genieinprompt.app' }}
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$DEPLOY_URL?cb=$RANDOM")
          echo "PWA HTTP status: $STATUS"
          [ "$STATUS" -eq 200 ] || { echo "::error::Smoke test failed: HTTP $STATUS"; exit 1; }
          HTML=$(curl -s "$DEPLOY_URL/index.html?cb=$RANDOM")
          echo "$HTML" | grep -q 'controllerchange' || { echo "::error::Live HTML missing controllerchange (silent SW update logic)"; exit 1; }
          echo "$HTML" | grep -q 'New version available! Reload to update' && { echo "::error::Live HTML still serves old confirm() prompt"; exit 1; } || true
          CC=$(curl -sI "$DEPLOY_URL/main.dart.js?cb=$RANDOM" | grep -i '^cache-control:' || true)
          echo "main.dart.js: $CC"
          echo "$CC" | grep -qi 'immutable' && { echo "::error::main.dart.js still served with immutable header"; exit 1; } || true
          echo "Deploy verified: silent SW logic live, main.dart.js no-cache."

      - name: Upload PWA build (no Vercel token configured)
        if: env.HAS_VERCEL != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pwa-build
          path: build/web/
          retention-days: 7

  # ---- Deploy Android to Play Store ----
  deploy-android:
    name: Deploy → Play Store
    runs-on: ubuntu-latest
    needs: build-android
    environment: production
    continue-on-error: true
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download Android AAB
        uses: actions/download-artifact@v4
        continue-on-error: true
        id: dl_aab
        with:
          name: android-aab

      - name: Upload to Play Store
        if: steps.dl_aab.outcome == 'success'
        continue-on-error: true
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.promptgenie.app
          releaseFiles: app-release.aab
          track: internal
          status: completed
          changesNotSentForReview: false

  # ---- Deploy iOS to App Store ----
  deploy-ios:
    name: Deploy → App Store
    runs-on: macos-latest
    needs: build-ios
    environment: production
    continue-on-error: true
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        continue-on-error: true
        id: dl_ipa
        with:
          name: ios-ipa

      - name: Upload to App Store Connect
        if: steps.dl_ipa.outcome == 'success'
        continue-on-error: true
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path:        '*.ipa'
          issuer-id:       ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id:      ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
