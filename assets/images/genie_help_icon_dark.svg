<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-label="genie help">
  <!-- Bowl: center (128,110), radius 56, stroke 16. Cyan accent ~50° arc at top, gold body completes the ring + left-hooking descender. (dark-bg variant = same colors as primary) -->
  <path d="M 120 54 A 56 56 0 0 1 178 96"
        stroke="#22BDD8" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M 178 96
           A 56 56 0 1 0 138 165
           C 145 195, 130 220, 90 218
           C 60 216, 60 188, 95 182"
        stroke="#C99B2C" stroke-width="16"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Sparkle (cyan 4-point star, top-right) -->
  <path d="M 198 32 L 202 46 L 216 50 L 202 54 L 198 68 L 194 54 L 180 50 L 194 46 Z"
        fill="#22BDD8"/>

  <!-- Gold pixel face: 2×2 grid of 22×22 squares, 4px gap, centered at (128,110) -->
  <g fill="#C99B2C">
    <rect x="104" y="86"  width="22" height="22" rx="5"/>
    <rect x="130" y="86"  width="22" height="22" rx="5"/>
    <rect x="104" y="112" width="22" height="22" rx="5"/>
    <rect x="130" y="112" width="22" height="22" rx="5"/>
  </g>
</svg>
