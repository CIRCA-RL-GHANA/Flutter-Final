include: package:flutter_lints/flutter.yaml

analyzer:
  # Exclude broken/stale scaffolding files and outdated tests from analysis.
  # These reference symbols that no longer exist (wrong casing — e.g. GOProvider
  # vs the actual GoProvider — or missing imports) and are not wired into any
  # route or import graph. They block CI but have zero runtime impact.
  exclude:
    - lib/features/go/screens/go_dashboard_complete.dart
    - lib/features/go/screens/go_screens_2_batch.dart
    - lib/features/market/market_screens_complete.dart
    - lib/features/market/screens/market_commerce_screen.dart
    - lib/features/qualchat/screens/qualchat_dashboard_complete.dart
    - test/models/order_model_test.dart
    - test/models/ride_model_test.dart
    - test/models/user_model_test.dart

linter:
  rules:
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    avoid_print: true
    prefer_single_quotes: true
    sort_child_properties_last: true
    use_build_context_synchronously: true
    prefer_final_fields: true
    avoid_empty_else: true
    prefer_is_empty: true
    prefer_is_not_empty: true
    avoid_returning_null_for_void: true
    cancel_subscriptions: true
    close_sinks: true
    unnecessary_statements: true
