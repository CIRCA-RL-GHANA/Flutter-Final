  <style>
    /* Splash / loading screen */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background-color: #1A1A2E;
    }

    .splash {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background-color: #1A1A2E;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    }

    .splash img {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .splash .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(63, 81, 181, 0.2);
      border-top: 3px solid #3F51B5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .splash .app-name {
      color: #3F51B5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 18px;
      font-weight: 600;
      margin-top: 16px;
      letter-spacing: 1px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }

    /* Prevent right-click context menu */
    body { -webkit-user-select: none; user-select: none; }
  </style>
</head>
<body>
  <!-- Splash screen with app icon -->
  <div class="splash" id="splash">
    <img src="icons/icon_192x192.png" alt="PROMPT Genie">
    <div class="spinner"></div>
    <div class="app-name">PROMPT Genie</div>
  </div>

  <script src="flutter.js" defer></script>
  <script>
    // Disable right-click context menu in production
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

    window.addEventListener('load', function() {
      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('flutter_service_worker.js').then(function(reg) {
          console.log('[SW] Registered with scope:', reg.scope);

          // Listen for updates
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
                // New content available, show update prompt
                if (confirm('New version available! Reload to update?')) {
                  window.location.reload();
                }
              }
            });
          });
        }).catch(function(err) {
          console.warn('[SW] Registration failed:', err);
        });
      }

      // Initialize Flutter engine
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: null,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });

    // Remove splash on first Flutter frame
    window.addEventListener('flutter-first-frame', function() {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(function() { splash.remove(); }, 300);
      }
    });

    // Global error handler
    window.addEventListener('error', function(e) {
      console.error('[App Error]', e.message, e.filename, e.lineno);
    });

    // Unhandled promise rejection handler
    window.addEventListener('unhandledrejection', function(e) {
      console.error('[Unhandled Promise]', e.reason);
    });
  </script>
</body>
