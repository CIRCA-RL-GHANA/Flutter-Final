  <style>
    /* Splash / loading screen */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background-color: #08080F;
    }

    .splash {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background-color: #08080F;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    }

    .splash .mark {
      width: 112px;
      height: 112px;
      margin-bottom: 28px;
      animation: pulse 1.6s ease-in-out infinite;
    }

    .splash .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid rgba(34, 189, 216, 0.18);
      border-top: 2px solid #22BDD8;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    .splash .app-name {
      color: #E8E8F0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-top: 18px;
      letter-spacing: 0.5px;
    }

    .splash .app-name .accent { color: #22BDD8; }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.04); opacity: 0.88; }
    }

    /* Prevent right-click context menu */
    body { -webkit-user-select: none; user-select: none; }
  </style>
</head>
<body>
  <!-- Splash screen with inline brand mark (zero-flash) -->
  <div class="splash" id="splash">
    <svg class="mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-label="genie help">
      <path d="M172 36 L176 50 L190 54 L176 58 L172 72 L168 58 L154 54 L168 50 Z" fill="#22BDD8"/>
      <path d="M 116 64 A 66 66 0 0 1 176 130" stroke="#22BDD8" stroke-width="17" stroke-linecap="round" fill="none"/>
      <path d="M 104 64 A 66 66 0 1 0 160 172 C 184 192, 174 218, 142 218 C 112 218, 100 200, 116 192"
            stroke="#C99B2C" stroke-width="17" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <g fill="#C99B2C">
        <rect x="83"  y="101" width="24" height="24" rx="5"/>
        <rect x="113" y="101" width="24" height="24" rx="5"/>
        <rect x="83"  y="131" width="24" height="24" rx="5"/>
        <rect x="113" y="131" width="24" height="24" rx="5"/>
      </g>
    </svg>
    <div class="spinner"></div>
    <div class="app-name">genie <span class="accent">help</span></div>
  </div>

  <script src="flutter.js" defer></script>
  <script>
    // Disable right-click context menu in production
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

    window.addEventListener('load', function() {
      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('flutter_service_worker.js').then(function(reg) {
          console.log('[SW] Registered with scope:', reg.scope);

          // Listen for updates
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
                // New content available, show update prompt
                if (confirm('New version available! Reload to update?')) {
                  window.location.reload();
                }
              }
            });
          });
        }).catch(function(err) {
          console.warn('[SW] Registration failed:', err);
        });
      }

      // Initialize Flutter engine
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: null,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });

    // Remove splash on first Flutter frame
    window.addEventListener('flutter-first-frame', function() {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(function() { splash.remove(); }, 300);
      }
    });

    // Global error handler
    window.addEventListener('error', function(e) {
      console.error('[App Error]', e.message, e.filename, e.lineno);
    });

    // Unhandled promise rejection handler
    window.addEventListener('unhandledrejection', function(e) {
      console.error('[Unhandled Promise]', e.reason);
    });
  </script>
