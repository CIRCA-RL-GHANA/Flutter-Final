  <style>
    /* Brand tokens (CSS custom properties for the boot shell only) */
    :root {
      --bg:       #08080F;
      --bg-2:     #11131C;
      --cyan:     #22BDD8;
      --gold:     #C99B2C;
      --text:     #E8E8F0;
      --text-dim: rgba(232, 232, 240, 0.64);
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* Splash / loading screen */
    .splash {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 14px;
      height: 100vh;
      width: 100vw;
      /* Soft radial vignette for depth */
      background:
        radial-gradient(ellipse at center, var(--bg-2) 0%, var(--bg) 70%);
      position: fixed;
      top: 0;
      left: 0;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: opacity;
    }

    .splash.hidden { opacity: 0; pointer-events: none; }

    .splash .mark {
      width: 112px;
      height: 112px;
      margin-bottom: 14px;
      animation: pulse 2.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      filter: drop-shadow(0 8px 32px rgba(34, 189, 216, 0.18));
      will-change: transform, opacity;
    }

    .splash .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(34, 189, 216, 0.14);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      will-change: transform;
    }

    .splash .app-name {
      color: var(--text);
      font-size: 17px;
      font-weight: 700;
      margin-top: 4px;
      letter-spacing: 0.2px;
    }

    .splash .app-name .accent { color: var(--cyan); }

    .splash .tagline {
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%      { transform: scale(1.04); opacity: 0.88; }
    }

    /* Respect users who prefer reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .splash, .splash .mark, .splash .spinner { animation: none !important; transition: opacity 0.2s linear !important; }
    }

    body { -webkit-user-select: none; user-select: none; }
  </style>

<body>
  <!-- Splash screen with inline brand mark (zero-flash) -->
  <div class="splash" id="splash" role="status" aria-live="polite" aria-label="Loading genie help">
    <svg class="mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-label="genie help">
      <path d="M 120 54 A 56 56 0 0 1 178 96" stroke="#22BDD8" stroke-width="16" stroke-linecap="round" fill="none"/>
      <path d="M 178 96 A 56 56 0 1 0 138 165 C 145 195, 130 220, 90 218 C 60 216, 60 188, 95 182"
            stroke="#C99B2C" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M 198 32 L 202 46 L 216 50 L 202 54 L 198 68 L 194 54 L 180 50 L 194 46 Z" fill="#22BDD8"/>
      <g fill="#C99B2C">
        <rect x="104" y="86"  width="22" height="22" rx="5"/>
        <rect x="130" y="86"  width="22" height="22" rx="5"/>
        <rect x="104" y="112" width="22" height="22" rx="5"/>
        <rect x="130" y="112" width="22" height="22" rx="5"/>
      </g>
    </svg>
    <div class="spinner" aria-hidden="true"></div>
    <div class="app-name">genie <span class="accent">help</span></div>
    <div class="tagline">The OS for commerce</div>
  </div>

  <script src="flutter.js" defer></script>
  <script>
    // Disable right-click context menu in production
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

    window.addEventListener('load', function() {
      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('flutter_service_worker.js').then(function(reg) {
          console.log('[SW] Registered with scope:', reg.scope);

          // Listen for updates
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
                // New content available, show update prompt
                if (confirm('New version available! Reload to update?')) {
                  window.location.reload();
                }
              }
            });
          });
        }).catch(function(err) {
          console.warn('[SW] Registration failed:', err);
        });
      }

      // Initialize Flutter engine
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: null,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });

    // Remove splash on first Flutter frame (with hard timeout watchdog)
    function hideSplash() {
      var splash = document.getElementById('splash');
      if (!splash || splash.classList.contains('hidden')) return;
      splash.classList.add('hidden');
      setTimeout(function() { if (splash && splash.parentNode) splash.parentNode.removeChild(splash); }, 450);
    }
    window.addEventListener('flutter-first-frame', hideSplash);
    // Failsafe: never leave splash hanging beyond 12s
    setTimeout(hideSplash, 12000);

    // Global error handler
    window.addEventListener('error', function(e) {
      console.error('[App Error]', e.message, e.filename, e.lineno);
    });

    // Unhandled promise rejection handler
    window.addEventListener('unhandledrejection', function(e) {
      console.error('[Unhandled Promise]', e.reason);
    });
  </script>
</body>
